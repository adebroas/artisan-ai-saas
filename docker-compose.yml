version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: artisan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artisan
      POSTGRES_PASSWORD: artisan123
      POSTGRES_DB: artisan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: artisan_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: